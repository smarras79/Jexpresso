name: Classical Benchmarks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 2 * * 0'   # Weekly on Sunday at 02:00 UTC
  workflow_dispatch:       # Allow manual triggering

jobs:
  benchmarks:
    name: Classical Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.11.2'
          arch: x64

      - uses: actions/cache@v3
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-benchmarks-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-benchmarks-
            ${{ runner.os }}-

      - uses: julia-actions/julia-buildpkg@v1

      # -----------------------------------------------------------------------
      # Simulation steps — each benchmark runs as its own julia process so
      # that a crash in one cannot affect the others.  CI_MODE=true makes
      # Jexpresso load inputs from test/CI-runs/ (reduced tend, hdf5 output).
      # Output .h5 files land in test/CI-runs/<EQ>/<CASE>/output/.
      # continue-on-error lets all seven run even when one fails.
      # -----------------------------------------------------------------------

      - name: "Simulate: CompEuler/theta"
        id: sim_compeuler_theta
        continue-on-error: true
        timeout-minutes: 40
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "CompEuler", "theta", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: CompEuler/3d"
        id: sim_compeuler_3d
        continue-on-error: true
        timeout-minutes: 40
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "CompEuler", "3d", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: CompEuler/wave1d"
        id: sim_compeuler_wave1d
        continue-on-error: true
        timeout-minutes: 20
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "CompEuler", "wave1d", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: Burgers/case1"
        id: sim_burgers_case1
        continue-on-error: true
        timeout-minutes: 20
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "Burgers", "case1", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: Burgers/case2d"
        id: sim_burgers_case2d
        continue-on-error: true
        timeout-minutes: 30
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "Burgers", "case2d", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: Elliptic/2dlaplace"
        id: sim_elliptic_2dlaplace
        continue-on-error: true
        timeout-minutes: 20
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "Elliptic", "2dlaplace", "true")
            include("src/Jexpresso.jl")
          '

      - name: "Simulate: ShallowWater/TC2"
        id: sim_shallowwater_tc2
        continue-on-error: true
        timeout-minutes: 40
        run: |
          julia --project=. -e '
            push!(empty!(ARGS), "ShallowWater", "TC2", "true")
            include("src/Jexpresso.jl")
          '

      # -----------------------------------------------------------------------
      # Comparison step — loads only HDF5.jl (fast) and checks every .h5 file
      # in test/CI-runs/<EQ>/<CASE>/output/ against the committed reference in
      # test/CI-ref/<EQ>/<CASE>/output/ using atol=1e-5.
      # If no reference files exist yet, the benchmark is marked as skipped
      # rather than failed (run the generate-ci-ref workflow to bootstrap).
      # -----------------------------------------------------------------------
      - name: Compare against reference solutions
        id: compare
        if: always()
        continue-on-error: true
        run: julia --project=. test/compare_benchmarks.jl

      # -----------------------------------------------------------------------
      # Markdown summary table shown on the workflow run page.
      # -----------------------------------------------------------------------
      - name: Benchmark report
        if: always()
        run: |
          icon() { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }

          {
            echo "## Classical Benchmark Results"
            echo ""
            echo "### Simulation (did the code run?)"
            echo ""
            echo "| Benchmark | Result |"
            echo "|-----------|--------|"
            echo "| CompEuler/theta    | $(icon '${{ steps.sim_compeuler_theta.outcome }}') |"
            echo "| CompEuler/3d       | $(icon '${{ steps.sim_compeuler_3d.outcome }}') |"
            echo "| CompEuler/wave1d   | $(icon '${{ steps.sim_compeuler_wave1d.outcome }}') |"
            echo "| Burgers/case1      | $(icon '${{ steps.sim_burgers_case1.outcome }}') |"
            echo "| Burgers/case2d     | $(icon '${{ steps.sim_burgers_case2d.outcome }}') |"
            echo "| Elliptic/2dlaplace | $(icon '${{ steps.sim_elliptic_2dlaplace.outcome }}') |"
            echo "| ShallowWater/TC2   | $(icon '${{ steps.sim_shallowwater_tc2.outcome }}') |"
            echo ""
            echo "### Numerical comparison (do results match reference?)"
            echo ""
            echo "| Status |"
            echo "|--------|"
            echo "| $(icon '${{ steps.compare.outcome }}') (see Compare step log for per-benchmark detail) |"
            echo ""
            echo "> Reference files live in \`test/CI-ref/\`. "
            echo "> If a benchmark shows **skipped**, run the **generate-ci-ref** workflow to create its reference."
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------------
      # Fail the overall job if any simulation or the comparison failed.
      # -----------------------------------------------------------------------
      - name: Fail if any benchmark failed
        if: always()
        run: |
          outcomes=(
            "${{ steps.sim_compeuler_theta.outcome }}"
            "${{ steps.sim_compeuler_3d.outcome }}"
            "${{ steps.sim_compeuler_wave1d.outcome }}"
            "${{ steps.sim_burgers_case1.outcome }}"
            "${{ steps.sim_burgers_case2d.outcome }}"
            "${{ steps.sim_elliptic_2dlaplace.outcome }}"
            "${{ steps.sim_shallowwater_tc2.outcome }}"
            "${{ steps.compare.outcome }}"
          )
          failed=0
          for o in "${outcomes[@]}"; do
            [ "$o" = "failure" ] && failed=1
          done
          if [ $failed -eq 1 ]; then
            echo "One or more benchmarks failed. See the report above for details."
            exit 1
          fi
          echo "All benchmarks passed."
